version: 1
policy:
  source_of_truth: docs/todo.yaml
  legacy_markdown: docs/todo.md
  rules:
  - Use dephy_todo as the global TODO entry point.
  - Before starting work, add or update the relevant TODO item.
  - When behavior changes, update TODO status in the same change.
  - Keep legacy markdown details until they are fully migrated into this YAML.
items:
- id: todo-yaml-source
  area: repo
  title: Add docs/todo.yaml so mqtt_min_broker is tracked globally.
  status: done
- id: migrate-legacy-todo
  area: repo
  title: Migrate the historical docs/todo.md checklist into structured YAML without
    losing release and test details.
  status: done
  notes: Structured YAML now tracks current actionable broker work while docs/todo.md
    is retained as migrated legacy history.
- id: broker-testkit-fixtures
  area: validation
  title: Reuse dephy_testkit broker and P2P fixtures in broker integration tests where
    they reduce duplication.
  status: done
  notes: Added scripts/test_with_testkit.sh using dephy_testkit result and assertion
    helpers.
- id: p2p-scale-benchmark
  area: performance
  title: Add a repeatable P2P routing benchmark for peer count, subscription count,
    and retained-message paths.
  status: done
  notes: Existing bench_p2p_scale.sh and bench_p2p_docker_scale.sh provide repeatable
    P2P routing benchmarks.
- id: packet-buffer-audit
  area: performance
  title: Audit fixed-size packet buffers and add explicit high-water or overflow regression
    coverage.
  status: done
  notes: Added scripts/audit_packet_buffers.sh and Makefile packet-buffer-audit target.
- id: pass-golden-structure-audit
  area: repo
  title: Refactor broker module layout until it passes the module golden sample structure
    audit.
  status: done
  notes: Added docs/module_structure.md and passed module golden sample structure
    audit.
- id: unit-session-null-guard
  area: validation
  title: Guard unit_session create/find assertions against null dereference after allocation failure.
  status: done
  notes: cppcheck reported that test_create_find_delete checks session_create()
    for non-null and then immediately dereferences the pointer. Added an early
    return after the failed allocation assertion.
- id: broker-static-cleanup-pass
  area: validation
  title: Clean up low-risk cppcheck findings in broker tests and CLI helpers.
  status: done
  notes: Reduced redundant unit_packet assignments, made immutable packet fixtures
    const, and tightened mqtt_cli HTTP body parsing constness without changing
    public APIs.
